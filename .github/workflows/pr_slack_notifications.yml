name: pr-slack-notifications

on:
  pull_request:
    types: [opened, reopened, ready_for_review, review_requested, edited, synchronize, closed]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-slack-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: notify slack thread
        uses: actions/github-script@v7
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_CHANNEL_ID_VAR: ${{ vars.SLACK_CHANNEL_ID }}
          DEFAULT_SLACK_CHANNEL_ID: C03CR4NPYE7
          SLACK_USER_MAP_JSON: ${{ secrets.SLACK_USER_MAP_JSON }}
          AI_REVIEWER_LOGIN: ${{ vars.AI_REVIEWER_LOGIN }}
        with:
          script: |
            const slackBotToken = process.env.SLACK_BOT_TOKEN;
            if (!slackBotToken) {
              core.warning("SLACK_BOT_TOKEN is missing or unavailable for this event. Skipping Slack notification.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const eventName = context.eventName;
            const action = context.payload.action;

            async function resolvePrPayload() {
              if (eventName === "issue_comment") {
                const issue = context.payload.issue;
                if (!issue || !issue.pull_request) {
                  return null;
                }

                const prResponse = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: issue.number,
                });
                return prResponse.data;
              }

              return context.payload.pull_request || null;
            }

            const pr = await resolvePrPayload();
            if (!pr) {
              core.info("No pull_request payload. Skipping.");
              return;
            }

            const channel =
              process.env.SLACK_CHANNEL_ID ||
              process.env.SLACK_CHANNEL_ID_VAR ||
              process.env.DEFAULT_SLACK_CHANNEL_ID;

            if (!channel) {
              core.setFailed("Slack channel is not configured.");
              return;
            }

            const issueNumber = pr.number;
            const THREAD_MARKER_PREFIX = "<!-- slack-pr-thread-ts:";
            const THREAD_MARKER_REGEX = /<!--\s*slack-pr-thread-ts:([0-9.]+)\s*-->/;
            const SUMMARY_MARKER = "<!-- ai-summary-posted:v1 -->";
            const AI_REVIEW_REQUESTED_MARKER = "<!-- ai-review-requested:v1 -->";
            const AI_REVIEW_COMPLETED_PREFIX = "<!-- ai-review-completed:";

            function isCopilotReviewer(login) {
              if (!login) {
                return false;
              }
              return login.toLowerCase().includes("copilot");
            }

            async function slackApi(method, payload) {
              const response = await fetch(`https://slack.com/api/${method}`, {
                method: "POST",
                headers: {
                  Authorization: `Bearer ${slackBotToken}`,
                  "Content-Type": "application/json; charset=utf-8",
                },
                body: JSON.stringify(payload),
              });

              const data = await response.json();
              if (!data.ok) {
                throw new Error(`Slack API ${method} failed: ${data.error}`);
              }
              return data;
            }

            async function listIssueComments() {
              return github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              });
            }

            async function findIssueCommentByPredicate(predicate) {
              const comments = await listIssueComments();
              return comments.find((comment) => typeof comment.body === "string" && predicate(comment.body));
            }

            async function findThreadMetaComment() {
              return findIssueCommentByPredicate((body) => body.includes(THREAD_MARKER_PREFIX));
            }

            async function findMarkerComment(marker) {
              return findIssueCommentByPredicate((body) => body.includes(marker));
            }

            async function hasMarker(marker) {
              const comment = await findMarkerComment(marker);
              return Boolean(comment);
            }

            async function upsertMarker(marker, bodyText = marker) {
              const existing = await findMarkerComment(marker);
              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body: bodyText,
                });
                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: bodyText,
              });
            }

            async function createMarker(marker, bodyText = marker) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              });

              const alreadyExists = comments.some(
                (comment) => typeof comment.body === "string" && comment.body.includes(marker)
              );
              if (alreadyExists) {
                return false;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: bodyText,
              });
              return true;
            }

            function parseThreadTs(body) {
              if (!body) {
                return null;
              }
              const match = body.match(THREAD_MARKER_REGEX);
              return match ? match[1] : null;
            }

            async function saveThreadTs(threadTs) {
              const markerBody = `${THREAD_MARKER_PREFIX}${threadTs} -->`;
              const existing = await findThreadMetaComment();

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body: markerBody,
                });
                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: markerBody,
              });
            }

            function buildRootText() {
              const prLink = `<${pr.html_url}|#${pr.number} ${pr.title}>`;
              const author = pr.user?.login || "unknown";
              const baseRef = pr.base?.ref || "unknown";
              const headRef = pr.head?.ref || "unknown";

              return [
                "📣 PR 생성됨",
                `• PR: ${prLink}`,
                `• 작성자: \`${author}\``,
                `• 브랜치: \`${headRef}\` -> \`${baseRef}\``,
                "• 리뷰 관련 업데이트는 이 스레드에 계속 안내됩니다.",
              ].join("\n");
            }

            async function ensureThreadTs() {
              const existing = await findThreadMetaComment();
              const existingTs = parseThreadTs(existing?.body);
              if (existingTs) {
                return existingTs;
              }

              const rootMessage = await slackApi("chat.postMessage", {
                channel,
                text: buildRootText(),
                unfurl_links: false,
                unfurl_media: false,
              });

              const threadTs = rootMessage.ts;
              if (!threadTs) {
                throw new Error("Slack message was sent, but thread ts was missing.");
              }

              await saveThreadTs(threadTs);
              return threadTs;
            }

            async function postThreadMessage(text) {
              const threadTs = await ensureThreadTs();
              await slackApi("chat.postMessage", {
                channel,
                thread_ts: threadTs,
                reply_broadcast: false,
                text,
                unfurl_links: false,
                unfurl_media: false,
              });
            }

            function parseUserMap() {
              const raw = (process.env.SLACK_USER_MAP_JSON || "").trim();
              if (!raw) {
                return {};
              }
              try {
                const parsed = JSON.parse(raw);
                if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) {
                  return parsed;
                }
              } catch (error) {
                core.warning(`SLACK_USER_MAP_JSON parse failed: ${error.message}`);
              }
              return {};
            }

            function findSlackUserId(userMap, githubLogin) {
              if (!githubLogin) {
                return null;
              }
              if (userMap[githubLogin]) {
                return userMap[githubLogin];
              }

              const lowerLogin = githubLogin.toLowerCase();
              for (const [key, value] of Object.entries(userMap)) {
                if (key.toLowerCase() === lowerLogin) {
                  return value;
                }
              }
              return null;
            }

            function mentionSlackUsersFromGitHubLogins(userMap, githubLogins) {
              const mentions = [];
              const seen = new Set();
              for (const login of githubLogins) {
                const slackUserId = findSlackUserId(userMap, login);
                if (slackUserId && !seen.has(slackUserId)) {
                  mentions.push(`<@${slackUserId}>`);
                  seen.add(slackUserId);
                }
              }
              return mentions;
            }

            function reviewStateLabel(state) {
              switch (state) {
                case "approved":
                  return "승인";
                case "changes_requested":
                  return "수정 요청";
                case "commented":
                  return "코멘트";
                case "dismissed":
                  return "무효화";
                default:
                  return state || "알 수 없음";
              }
            }

            function isAiReviewRequestedFromPrBody(body) {
              if (!body) {
                return false;
              }
              return /\[ai-review\]/i.test(body);
            }

            function isAiReviewCommandComment(body) {
              if (!body) {
                return false;
              }
              return body.trim().toLowerCase().startsWith("/ai-review");
            }

            async function requestAiReviewerIfConfigured() {
              const aiReviewerLogin = (process.env.AI_REVIEWER_LOGIN || "").trim();
              if (!aiReviewerLogin) {
                return { status: "not_configured", label: "리뷰어 자동 지정은 설정되지 않음(AI_REVIEWER_LOGIN 없음)" };
              }

              try {
                await github.rest.pulls.requestReviewers({
                  owner,
                  repo,
                  pull_number: issueNumber,
                  reviewers: [aiReviewerLogin],
                });
                return { status: "requested", label: `AI 리뷰어 자동 지정 완료: \`${aiReviewerLogin}\`` };
              } catch (error) {
                core.warning(`Failed to request AI reviewer: ${error.message}`);
                return {
                  status: "failed",
                  label: `AI 리뷰어 자동 지정 실패: \`${aiReviewerLogin}\` (${error.message})`,
                };
              }
            }

            async function buildPrSummaryText() {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: issueNumber,
                per_page: 100,
              });

              const additions = files.reduce((sum, file) => sum + (file.additions || 0), 0);
              const deletions = files.reduce((sum, file) => sum + (file.deletions || 0), 0);
              const changedFiles = files.length;

              const areas = new Set();
              for (const file of files) {
                const filename = file.filename || "";
                const area = filename.includes("/") ? filename.split("/")[0] : filename;
                if (area) {
                  areas.add(area);
                }
              }

              const topFiles = files
                .slice()
                .sort((a, b) => (b.changes || 0) - (a.changes || 0))
                .slice(0, 5)
                .map((file) => `\`${file.filename}\``);

              const prBody = (pr.body || "").trim();
              const prBodyPreview = prBody
                ? prBody.replace(/\s+/g, " ").slice(0, 240)
                : "PR 본문 설명 없음";

              const areaList = Array.from(areas).slice(0, 5).map((area) => `\`${area}\``);
              const prLink = `<${pr.html_url}|#${pr.number} ${pr.title}>`;

              return [
                "🧠 PR 자동 요약",
                `• PR: ${prLink}`,
                `• 변경 파일: ${changedFiles}개 (+${additions} / -${deletions})`,
                `• 주요 영역: ${areaList.length ? areaList.join(", ") : "분류 불가"}`,
                `• 변경 큰 파일: ${topFiles.length ? topFiles.join(", ") : "없음"}`,
                `• 설명 요약: ${prBodyPreview}`,
              ].join("\n");
            }

            async function maybePostPrSummary(force = false) {
              if (!force) {
                const posted = await hasMarker(SUMMARY_MARKER);
                if (posted) {
                  return false;
                }
              }

              const summaryText = await buildPrSummaryText();
              await postThreadMessage(summaryText);
              await upsertMarker(SUMMARY_MARKER);
              return true;
            }

            async function maybeRequestAiReview(triggerLabel) {
              const alreadyRequested = await hasMarker(AI_REVIEW_REQUESTED_MARKER);
              if (alreadyRequested) {
                return false;
              }

              const requestStatus = await requestAiReviewerIfConfigured();
              const prLink = `<${pr.html_url}|#${pr.number} ${pr.title}>`;

              await postThreadMessage(
                [
                  "🤖 AI 리뷰 요청이 활성화됨",
                  `• 트리거: ${triggerLabel}`,
                  `• 상태: ${requestStatus.label}`,
                  `• PR: ${prLink}`,
                ].join("\n")
              );

              await upsertMarker(
                AI_REVIEW_REQUESTED_MARKER,
                `${AI_REVIEW_REQUESTED_MARKER}\ntrigger=${triggerLabel}\nstatus=${requestStatus.status}`
              );
              return true;
            }

            async function markAiReviewCompleted(provider, reviewId) {
              const marker = `${AI_REVIEW_COMPLETED_PREFIX}${provider}:${reviewId} -->`;
              return createMarker(marker, marker);
            }

            const prLink = `<${pr.html_url}|#${pr.number} ${pr.title}>`;

            if (eventName === "issue_comment" && action === "created") {
              const comment = context.payload.comment;
              if (!comment || !isAiReviewCommandComment(comment.body)) {
                core.info("Issue comment is not an AI review command.");
                return;
              }

              const authorAssociation = comment.author_association || "NONE";
              const allowedAssociations = new Set(["OWNER", "MEMBER", "COLLABORATOR"]);
              if (!allowedAssociations.has(authorAssociation)) {
                core.info(`Ignoring /ai-review from non-trusted association: ${authorAssociation}`);
                return;
              }

              await maybePostPrSummary(false);
              await maybeRequestAiReview("PR 코멘트 /ai-review");
              return;
            }

            if (eventName === "pull_request") {
              if (action === "opened") {
                await ensureThreadTs();
                await maybePostPrSummary(false);
                if (isAiReviewRequestedFromPrBody(pr.body)) {
                  await maybeRequestAiReview("PR 본문 [ai-review]");
                }
                return;
              }

              if (action === "reopened") {
                await postThreadMessage(`🔄 PR 다시 열림: ${prLink}`);
                return;
              }

              if (action === "ready_for_review") {
                await postThreadMessage(`🚀 PR이 리뷰 가능 상태로 변경됨: ${prLink}`);
                return;
              }

              if (action === "review_requested") {
                const requestedReviewerLogins = (pr.requested_reviewers || [])
                  .map((user) => user?.login)
                  .filter(Boolean);
                const userMap = parseUserMap();
                const mentions = mentionSlackUsersFromGitHubLogins(userMap, requestedReviewerLogins);

                await maybePostPrSummary(false);
                const mentionLine = mentions.length ? `${mentions.join(" ")}\n` : "";
                const targetText = requestedReviewerLogins.length
                  ? requestedReviewerLogins.map((login) => `\`${login}\``).join(", ")
                  : "리뷰어";

                await postThreadMessage(`📝 리뷰 요청 대상: ${targetText}\n${mentionLine}${prLink}`);
                if (isAiReviewRequestedFromPrBody(pr.body)) {
                  await maybeRequestAiReview("PR 본문 [ai-review]");
                }
                return;
              }

              if (action === "edited" || action === "synchronize") {
                if (isAiReviewRequestedFromPrBody(pr.body)) {
                  await maybePostPrSummary(false);
                  await maybeRequestAiReview("PR 본문 [ai-review]");
                }
                return;
              }

              if (action === "closed") {
                if (pr.merged) {
                  await postThreadMessage(`✅ PR 머지 완료: ${prLink}`);
                } else {
                  await postThreadMessage(`📪 PR 닫힘(미머지): ${prLink}`);
                }
                return;
              }

              core.info(`Unhandled pull_request action: ${action}`);
              return;
            }

            if (eventName === "pull_request_review" && action === "submitted") {
              const review = context.payload.review;
              const reviewerLogin = review?.user?.login || "unknown";
              const state = reviewStateLabel(review?.state);
              const reviewHtmlUrl = review?.html_url || pr.html_url;

              if (isCopilotReviewer(reviewerLogin)) {
                const reviewId = review?.id || "unknown";
                const shouldNotify = await markAiReviewCompleted("copilot", reviewId);
                if (!shouldNotify) {
                  core.info(`Copilot review already notified: ${reviewId}`);
                  return;
                }

                await postThreadMessage(
                  [
                    "🤖 Copilot PR 리뷰 완료",
                    `• 상태: ${state}`,
                    `• 리뷰 링크: <${reviewHtmlUrl}|리뷰 보기>`,
                    `• PR: ${prLink}`,
                  ].join("\n")
                );
                return;
              }

              const userMap = parseUserMap();
              const prAuthorLogin = pr.user?.login || null;
              const prAuthorSlackId = findSlackUserId(userMap, prAuthorLogin);
              const mentionLine = prAuthorSlackId ? `<@${prAuthorSlackId}>\n` : "";
              await postThreadMessage(
                `${mentionLine}👀 \`${reviewerLogin}\`님이 리뷰를 남김: *${state}*\n${prLink}`
              );

              if (review?.state === "approved") {
                await postThreadMessage(`${mentionLine}✅ 리뷰 완료(승인): ${prLink}`);
              }
              return;
            }

            core.info(`Unhandled event/action: ${eventName}/${action}`);
