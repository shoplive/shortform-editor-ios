name: pr-slack-notifications

on:
  pull_request:
    types: [opened, reopened, ready_for_review, review_requested, closed]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-slack-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: notify slack thread
        uses: actions/github-script@v7
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_CHANNEL_ID_VAR: ${{ vars.SLACK_CHANNEL_ID }}
          DEFAULT_SLACK_CHANNEL_ID: C03CR4NPYE7
          SLACK_USER_MAP_JSON: ${{ secrets.SLACK_USER_MAP_JSON }}
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info("No pull_request payload. Skipping.");
              return;
            }

            const slackBotToken = process.env.SLACK_BOT_TOKEN;
            if (!slackBotToken) {
              core.warning("SLACK_BOT_TOKEN is missing or unavailable for this event. Skipping Slack notification.");
              return;
            }

            const channel =
              process.env.SLACK_CHANNEL_ID ||
              process.env.SLACK_CHANNEL_ID_VAR ||
              process.env.DEFAULT_SLACK_CHANNEL_ID;

            if (!channel) {
              core.setFailed("Slack channel is not configured.");
              return;
            }

            const THREAD_MARKER_PREFIX = "<!-- slack-pr-thread-ts:";
            const THREAD_MARKER_REGEX = /<!--\s*slack-pr-thread-ts:([0-9.]+)\s*-->/;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = pr.number;
            const eventName = context.eventName;
            const action = context.payload.action;

            async function slackApi(method, payload) {
              const response = await fetch(`https://slack.com/api/${method}`, {
                method: "POST",
                headers: {
                  Authorization: `Bearer ${slackBotToken}`,
                  "Content-Type": "application/json; charset=utf-8",
                },
                body: JSON.stringify(payload),
              });

              const data = await response.json();
              if (!data.ok) {
                throw new Error(`Slack API ${method} failed: ${data.error}`);
              }
              return data;
            }

            async function findThreadMetaComment() {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              });

              return comments.find(
                (comment) => typeof comment.body === "string" && comment.body.includes(THREAD_MARKER_PREFIX)
              );
            }

            function parseThreadTs(body) {
              if (!body) {
                return null;
              }
              const match = body.match(THREAD_MARKER_REGEX);
              return match ? match[1] : null;
            }

            async function saveThreadTs(threadTs) {
              const markerBody = `${THREAD_MARKER_PREFIX}${threadTs} -->`;
              const existing = await findThreadMetaComment();

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body: markerBody,
                });
                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: markerBody,
              });
            }

            function buildRootText() {
              const prLink = `<${pr.html_url}|#${pr.number} ${pr.title}>`;
              const author = pr.user?.login || "unknown";
              const baseRef = pr.base?.ref || "unknown";
              const headRef = pr.head?.ref || "unknown";

              return [
                "📣 PR 생성됨",
                `• PR: ${prLink}`,
                `• 작성자: \`${author}\``,
                `• 브랜치: \`${headRef}\` -> \`${baseRef}\``,
                "• 리뷰 관련 업데이트는 이 스레드에 계속 안내됩니다.",
              ].join("\n");
            }

            async function ensureThreadTs() {
              const existing = await findThreadMetaComment();
              const existingTs = parseThreadTs(existing?.body);
              if (existingTs) {
                return existingTs;
              }

              const rootMessage = await slackApi("chat.postMessage", {
                channel,
                text: buildRootText(),
                unfurl_links: false,
                unfurl_media: false,
              });

              const threadTs = rootMessage.ts;
              if (!threadTs) {
                throw new Error("Slack message was sent, but thread ts was missing.");
              }

              await saveThreadTs(threadTs);
              return threadTs;
            }

            async function postThreadMessage(text) {
              const threadTs = await ensureThreadTs();
              await slackApi("chat.postMessage", {
                channel,
                thread_ts: threadTs,
                reply_broadcast: false,
                text,
                unfurl_links: false,
                unfurl_media: false,
              });
            }

            function parseUserMap() {
              const raw = (process.env.SLACK_USER_MAP_JSON || "").trim();
              if (!raw) {
                return {};
              }
              try {
                const parsed = JSON.parse(raw);
                if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) {
                  return parsed;
                }
              } catch (error) {
                core.warning(`SLACK_USER_MAP_JSON parse failed: ${error.message}`);
              }
              return {};
            }

            function findSlackUserId(userMap, githubLogin) {
              if (!githubLogin) {
                return null;
              }
              if (userMap[githubLogin]) {
                return userMap[githubLogin];
              }

              const lowerLogin = githubLogin.toLowerCase();
              for (const [key, value] of Object.entries(userMap)) {
                if (key.toLowerCase() === lowerLogin) {
                  return value;
                }
              }
              return null;
            }

            function mentionSlackUsersFromGitHubLogins(userMap, githubLogins) {
              const mentions = [];
              const seen = new Set();
              for (const login of githubLogins) {
                const slackUserId = findSlackUserId(userMap, login);
                if (slackUserId && !seen.has(slackUserId)) {
                  mentions.push(`<@${slackUserId}>`);
                  seen.add(slackUserId);
                }
              }
              return mentions;
            }

            function reviewStateLabel(state) {
              switch (state) {
                case "approved":
                  return "승인";
                case "changes_requested":
                  return "수정 요청";
                case "commented":
                  return "코멘트";
                case "dismissed":
                  return "무효화";
                default:
                  return state || "unknown";
              }
            }

            const prLink = `<${pr.html_url}|#${pr.number} ${pr.title}>`;

            if (eventName === "pull_request") {
              if (action === "opened") {
                await ensureThreadTs();
                return;
              }

              if (action === "reopened") {
                await postThreadMessage(`🔄 PR 다시 열림: ${prLink}`);
                return;
              }

              if (action === "ready_for_review") {
                await postThreadMessage(`🚀 PR이 리뷰 가능 상태로 변경됨: ${prLink}`);
                return;
              }

              if (action === "review_requested") {
                const requestedReviewerLogins = (pr.requested_reviewers || [])
                  .map((user) => user?.login)
                  .filter(Boolean);
                const userMap = parseUserMap();
                const mentions = mentionSlackUsersFromGitHubLogins(userMap, requestedReviewerLogins);

                const mentionLine = mentions.length ? `${mentions.join(" ")}\n` : "";
                const targetText = requestedReviewerLogins.length
                  ? requestedReviewerLogins.map((login) => `\`${login}\``).join(", ")
                  : "리뷰어";

                await postThreadMessage(`📝 리뷰 요청 대상: ${targetText}\n${mentionLine}${prLink}`);
                return;
              }

              if (action === "closed") {
                if (pr.merged) {
                  await postThreadMessage(`✅ PR 머지 완료: ${prLink}`);
                } else {
                  await postThreadMessage(`📪 PR 닫힘(미머지): ${prLink}`);
                }
                return;
              }

              core.info(`Unhandled pull_request action: ${action}`);
              return;
            }

            if (eventName === "pull_request_review" && action === "submitted") {
              const review = context.payload.review;
              const reviewerLogin = review?.user?.login || "unknown";
              const state = reviewStateLabel(review?.state);

              const userMap = parseUserMap();
              const prAuthorLogin = pr.user?.login || null;
              const prAuthorSlackId = findSlackUserId(userMap, prAuthorLogin);
              const mentionLine = prAuthorSlackId ? `<@${prAuthorSlackId}>\n` : "";
              await postThreadMessage(
                `${mentionLine}👀 \`${reviewerLogin}\`님이 리뷰를 남김: *${state}*\n${prLink}`
              );

              if (review?.state === "approved") {
                await postThreadMessage(`${mentionLine}✅ 리뷰 완료(승인): ${prLink}`);
              }
              return;
            }

            core.info(`Unhandled event/action: ${eventName}/${action}`);
