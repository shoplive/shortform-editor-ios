name: release-action_common


on:
  workflow_dispatch:
    inputs:
        tags:
          description: 'Version Tag'
          required: true
          type: string
          


jobs:
  build:
    runs-on: self-hosted

    env:
      COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
      VERSION: ${{ inputs.tags }}
      SDK_TYPE: ${{ inputs.options }}

    steps:
      - uses: actions/checkout@v3
      - uses: jdx/mise-action@v2

      - name: install tuist
        run: |
          if [ ! -f /usr/local/bin/tuist ]; then
              echo "Tuist not found, installing..."
              mise install tuist
          else
              echo "Tuist already installed. Skipping installation."
          fi
          
      - name: build tuist
        run: |
          TUIST_GENTYPE=SHORTFORM tuist generate --no-open
      
      - name: build xcframework
        run: |
          bash build_shortform.sh
      
      - name: clone public repo
        run: |
          git clone --depth 1 https://github.com/shoplive/shortform-ios.git
      
      - name: move framework to public repository
        run: |
          cp -r ./SLXCFrameworks/ShopLiveShortformSDK.xcframework ./shortform-ios/Frameworks
      
      - name: set podspec versioning
        run: |
          cd shortform-ios
          sed -i '' '3d' "ShopliveShortformSDK.podspec"
          sed -i '' '3i\
            spec.version       = "'"$VERSION"'"
          ' ShopliveShortformSDK.podspec
      
      - name: commit and push to public repository
        run: |
          cd shortform-ios && ls -a
          git config credential.helper 'cache --timeout=120'
          git config user.email "hassan@shoplive.cloud"
          git config user.name "hassan0424"
          git add .
          git commit -m "framework updated"
          git tag $VERSION
          git push -q https://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@github.com/shoplive/shortform-ios
          git push -q https://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@github.com/shoplive/shortform-ios $VERSION

      - name: deploy cocoapod
        run: |
          cd shortform-ios
          pod trunk push ShopliveShortformSDK.podspec
      
      
     
