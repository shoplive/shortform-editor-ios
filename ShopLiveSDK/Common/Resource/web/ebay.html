<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, shrink-to-fit=no" />
    <title>eBay</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: transparent;
      }
    </style>

    <script>
      function getQueryStringObject() {
        var a = window.location.search.substr(1).split("&");
        if (!a) return {};
        var b = {};
        for (var i = 0; i < a.length; ++i) {
          var p = a[i].split("=", 2);
          if (p.length === 1) {
            b[p[0]] = "";
          } else {
            b[p[0]] = decodeURIComponent(p[1].replace(/\+/g, " "));
          }
        }
        return b;
      }
    </script>
  </head>

  <body>
    <div id="root-mobile" style="text-align: center"></div>

    <script>
      const _appInterface = "ShopLiveAppInterface";

      function isIosApp() {
        // noinspection JSUnresolvedVariable
        return window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers[_appInterface];
      }

      function isAndroidApp() {
        return window[_appInterface];
      }

      var qs = getQueryStringObject();

      
      // init
      var playerId = "root-mobile";

      var messageCallback = {
        ERROR: (payload) => {
          if (isIosApp()) {
            window.webkit.messageHandlers[_appInterface].postMessage({
              action: "ERROR",
              payload: payload,
            });
          } else if (isAndroidApp()) {
            window[_appInterface].ERROR(payload.code, payload.msg);
          } else {
            console.log(`[ERROR '${payload}']`);
          }
        },

        DOWNLOAD_COUPON: (payload) => {
          if (isIosApp()) {
            window.webkit.messageHandlers[_appInterface].postMessage({
              action: "DOWNLOAD_COUPON",
              payload: {
                coupon: payload.coupon,
              },
            });
          } else if (isAndroidApp()) {
            window[_appInterface].DOWNLOAD_COUPON(payload.coupon);
          } else {
            console.log(`[DOWNLOAD_COUPON '${payload.coupon}'] Need to implement.`);
          }
        },
        CLICK_SHARE_BTN: (payload, defaultCallback) => {
          const shareUrl = payload.shareUrl;

          if (isIosApp()) {
            window.webkit.messageHandlers[_appInterface].postMessage({
              action: "CLICK_SHARE_BTN",
              payload: {
                url: shareUrl,
              },
            });
          } else if (isAndroidApp()) {
            window[_appInterface].CLICK_SHARE_BTN(shareUrl);
          } else {
            console.log("[CLICK_SHARE_BTN] Need to implement.", shareUrl);
            // defaultCallback(payload);
          }
        },
      };

      function isTrue(val) {
        return val === "1" || val === "true" || val === 1 || val === true;
      }

      function isNotFalse(val) {
        return !(val === "0" || val === "false" || val === 0 || val === false);
      }

      let tk = "";
      if (qs.userId) {
        tk = Object.assign({}, tk, { userId: qs.userId });
      }
      if (qs.userName) {
        tk = Object.assign({}, tk, { userName: qs.userName });
      }
      if (qs.gender) {
        tk = Object.assign({}, tk, { gender: qs.gender });
      }
      if (qs.age) {
        tk = Object.assign({}, tk, { age: qs.age });
      }
      if (qs.userScore) {
        tk = Object.assign({}, tk, { userScore: qs.userScore });
      }

      let version = qs.version || "0.0.0";
      let appVersion = qs.appVersion || "";
      let osType = isIosApp() ? "i" : isAndroidApp() ? "a" : "w";
      let country = "US";
      let locale = qs.language || navigator.language || navigator.userLanguage;
      let timezone;
      try {
        timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
      } catch (ignore) {
        timezone = "";
      }
      let mccmnc = qs.mccmnc || "";
      let osName = qs.osName || "_";
      let network = "";
      let identity = `${version},${osType},${country},${locale},${timezone},${mccmnc},${osName},${network}`;

      /** alt+k, s **/
      (function (s, h, o, p, l, i, v, e) {
        s["ShoplivePlayer"] = l;
        (s[l] =
          s[l] ||
          function () {
            (s[l].q = s[l].q || []).push(arguments);
          }),
          (i = h.createElement(o)),
          (v = h.getElementsByTagName(o)[0]);
        i.async = 1;
        i.src = p;
        v.parentNode.insertBefore(i, v);
      })(window, document, "script", "live.js", "mplayer");
      let options = {
        version: version,
        appVersion: appVersion,
        identity: identity,
        playerUrlPrefix: "",
        messageCallback: messageCallback,
        preview: isTrue(qs.preview),
        isReplay: isTrue(qs.isReplay),
        isPlayVideo: isTrue(qs.isPlayVideo),
        shareUrl: qs.shareUrl,
        __debug: isTrue(qs.__debug),
        // isContainSize: isTrue(qs.isContainSize),
        // keepAspectOnTabletPortrait: isTrue(qs.keepAspectOnTabletPortrait),
        isFullScreen: true,
        rk: qs.rk || "",
        closePlayerAfterCampaignEnd: 7000,
        ui: {
          viewerCount: isNotFalse(qs.viewerCount),
          likeCount: isNotFalse(qs.likeCount),
          shareButton: isNotFalse(qs.shareButton),
          pipButton: isTrue(qs.pipButton) || (isNotFalse(qs.pipButton) && (isIosApp() || isAndroidApp())),
          backButton: isTrue(qs.backButton) || (isNotFalse(qs.backButton) && isIosApp()),
          optionButton: isNotFalse(qs.optionButton),
          showNativeChatInput: isNotFalse(qs.showNativeChatInput),
          muteButton: isTrue(qs.muteButton)
        },
      };

      if (qs.guestUid) {
        options["guestUid"] = qs.guestUid;
      }
      if (qs.resolution) {
        options["resolution"] = qs.resolution;
      }

      if (qs.applicationName) {
        options["applicationName"] = qs.applicationName;
      }

      // mplayer("init", qs.ak, qs.ck, qs.tk || tk, options);
      // mplayer("run", playerId);

      mplayer("init", qs.ak, qs.ck, qs.tk || tk, options);

      mplayer("run", playerId);
    </script>
  </body>
</html>
