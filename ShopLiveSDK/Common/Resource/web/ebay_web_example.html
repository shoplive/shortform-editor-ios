<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, shrink-to-fit=no" />

    <title>EBAY Web Example</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #eee;
        text-align: center;
      }

      .main_container {
        max-width: 1024px;
        margin: auto;
        padding: 12px;
        background-color: white;
      }

      .wrap-live-player {
        display: flex;
        align-items: center;
      }

      .live-description {
        flex-grow: 1;
        text-align: center;
      }

      #player_container_fit {
        width: 100%;
        max-width: 420px;
        aspect-ratio: 9/16;
        margin: auto;
      }

      body.body_fullscreen_player > *:not(#player_fullscreen) {
        display: none;
      }
    </style>
  </head>

  <body>
    <div id="player_fullscreen"></div>

    <header class="main_container">
      <h1>Ebay Example</h1>
    </header>
    <main class="main_container">
      <h2>Your Contents</h2>
      <div class="wrap-live-player">
        <div id="player_container_fit"></div>
      </div>
      <h2>Your Contents</h2>
      <a href="/ebay_web_example.html?fullscreen=true">Full Screen Example</a>
    </main>
    <footer class="main_container">Footer</footer>

    <script>
      var query = {};
      if (location.search) {
        query = JSON.parse('{"' + location.search.substring(1).replace(/&/g, '","').replace(/=/g, '":"') + '"}', function (key, value) {
          return key === "" ? value : decodeURIComponent(value);
        });
      }

      var playerUrlPrefix = query.path || "https://stg-static.shoplive.cloud/cr/v/c01";
      var liveJsUrl = playerUrlPrefix + "/live.min.js";

      /** alt+k, s **/
      (function (s, h, o, p, l, i, v, e) {
        s["ShoplivePlayer"] = l;
        (s[l] =
          s[l] ||
          function () {
            (s[l].q = s[l].q || []).push(arguments);
          }),
          (i = h.createElement(o)),
          (v = h.getElementsByTagName(o)[0]);
        i.async = 1;
        i.src = p;
        v.parentNode.insertBefore(i, v);
      })(window, document, "script", liveJsUrl, "mplayer");

      var messageCallback = {
        DOWNLOAD_COUPON: function (payload) {
          alert("DOWNLOAD_COUPON");
        },
        CLICK_PRODUCT: function (payload) {
          alert("CLICK_PRODUCT");
          window.open(payload.url);
        },
      };

      var options = {
        shareUrl: location.href,
        messageCallback: messageCallback,
        playerUrlPrefix: playerUrlPrefix,
        ui: {
          viewerCount: true,
          likeCount: true,
          shareButton: true,
          backButton: true,
        },
      };

      var playerId = "player_container_fit";
      if (window.innerWidth <= 480 || query.fullscreen === "true") {
        options.isFullScreen = true;
        playerId = "player_fullscreen";
        document.body.classList.add("body_fullscreen_player");
      } else {
        options.isContainerFit = true;
        document.querySelector("#player_fullscreen").style.display = "none";
      }

      mplayer(
        "init",
        query.ak || "keCtCjDZkG3DFqENKzCj",
        query.ck || "3bdc80013a9a",
        query.tk || { userId: "USER_ID", userName: "USER_NAME" },
        options
      );

      mplayer("run", playerId);
    </script>
  </body>
</html>
